<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strijd Van Kah (nigger)</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #00151a 0%, #000814 70%, #000 100%);
  color: #9fdfe0;
  font-family: 'Cinzel', serif;
  text-align: center;
  overflow: hidden;
  cursor: pointer; /* zodat gebruikers weten dat ze kunnen klikken */
}

/* Subtiele water-energie animatie */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,180,200,0.04) 10%, transparent 50%);
  animation: waterMove 25s linear infinite;
}

@keyframes waterMove {
  from { transform: translate(-5%, -5%) rotate(0deg); }
  to { transform: translate(-5%, -5%) rotate(360deg); }
}

/* Titel */
h1 {
  margin-top: 140px;
  font-size: 3.8rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #b8f1f2;
  text-shadow: 0 0 8px rgba(0,200,255,0.3);
}

/* Countdown */
#countdown {
  font-size: 3.2rem;
  margin-top: 70px;
  color: #a0e6e8;
  text-shadow: 0 0 6px rgba(0,200,255,0.25);
}

/* Subtiele energie deeltjes */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #66f7ff;
  border-radius: 50%;
  opacity: 0.6;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}

.end {
  font-size: 3.8rem;
  letter-spacing: 3px;
  color: #8ffcff;
}

</style>
</head>
<body>

<h1>STRIJD VAN KAH</h1>
<div id="countdown"></div>

<!-- Muziek -->
<audio id="bgMusic" loop>
  <source src="battle-music.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<p style="font-family:sans-serif;font-size:14px;color:#aaa; margin-top:20px;">
Kahlania Klik muziek lania shelina
</p>

<script>
// Muziek starten na klik
const music = document.getElementById("bgMusic");
document.body.addEventListener("click", () => {
  music.play();
});

// Countdown tot morgen 11:00
const nowDate = new Date();
const target = new Date();
target.setDate(nowDate.getDate() + 1);
target.setHours(11, 0, 0, 0);
const countdownDate = target.getTime();

const x = setInterval(function() {
  const now = new Date().getTime();
  const distance = countdownDate - now;

  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    hours + " U  " + mins + " M  " + secs + " S ";

  if (distance < 0) {
    clearInterval(x);
    const cd = document.getElementById("countdown");
    cd.innerHTML = "SLOPHE NU";
    cd.classList.add("end");
  }
}, 1000);

// Energie deeltjes animatie
function createParticle() {
  const particle = document.createElement("div");
  particle.classList.add("particle");
  particle.style.left = Math.random() * window.innerWidth + "px";
  particle.style.bottom = "0px";
  particle.style.animationDuration = Math.random() * 5 + 3 + "s";
  document.body.appendChild(particle);

  setTimeout(() => {
    particle.remove();
  }, 8000);
}

setInterval(createParticle, 120);
</script>

</body>
</html>
