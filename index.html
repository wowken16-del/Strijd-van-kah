<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlienX Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    font-family: 'Cinzel', serif;
    color: white;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* 👽 AlienX achtergrond */
.alien-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
        url('alienx.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0.25;
    filter: brightness(0.6) contrast(1.3);
    z-index: -1;
}

/* Naam bovenaan */
.name {
    font-size: 5rem;
    color: #7fffd4;
    text-shadow: 0 0 10px rgba(0,255,255,0.6), 0 0 40px rgba(0,255,255,0.4);
    margin-bottom: 50px;
    animation: pulse 3s infinite alternate;
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}

/* Portfolio container */
.portfolio {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* Afbeelding + hover */
.portfolio img {
    width: 300px;
    border-radius: 10px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

.portfolio img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px rgba(0,255,255,0.5);
}

/* Tekst onder de afbeelding */
.portfolio .info {
    text-align: center;
    font-size: 1.2rem;
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

/* Subtle particles */
.particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: cyan;
    border-radius: 50%;
    opacity: 0.7;
    animation: float linear infinite;
    z-index: -1;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 0; }
    to { transform: translateY(-10vh); opacity: 1; }
}
</style>
</head>
<body>

<div class="alien-bg"></div>

<div class="name">AlienX</div>

<div class="portfolio">
    <img src="alienx_portfolio.png" alt="AlienX Portfolio Image">
    <div class="info">
        UI/UX & Roblox/Game Developer<br>
    
    </div>
</div>

<script>
/* Particles effect */
for (let i = 0; i < 80; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
