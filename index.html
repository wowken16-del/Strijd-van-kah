<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AlienX Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:'Cinzel', serif;
color:white;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* achtergrond */

.bg{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
url("alienx.jpg");
background-size:cover;
background-position:center;
opacity:0.25;
z-index:-1;
}

/* titel */

.name{
font-size:5rem;
color:#7fffd4;
text-shadow:
0 0 10px cyan,
0 0 40px cyan;
margin-bottom:80px;
}

/* stack container */

.stack{
position:relative;
width:320px;
height:200px;
cursor:pointer;
}

/* images */

.stack img{
position:absolute;
width:300px;
border-radius:10px;
transition:0.4s;
box-shadow:0 0 25px rgba(0,255,255,0.3);
}

/* stacked positions */

.stack img:nth-child(1){
transform:rotate(-5deg);
z-index:3;
}

.stack img:nth-child(2){
transform:rotate(3deg);
z-index:2;
}

.stack img:nth-child(3){
transform:rotate(8deg);
z-index:1;
}

/* hover effect */

.stack:hover img:nth-child(1){
transform:translateX(-180px) scale(1.1) rotate(-10deg);
}

.stack:hover img:nth-child(2){
transform:translateX(0px) scale(1.1);
}

.stack:hover img:nth-child(3){
transform:translateX(180px) scale(1.1) rotate(10deg);
}

/* info tekst */

.info{
margin-top:120px;
font-size:1.2rem;
text-align:center;
background:rgba(0,0,0,0.6);
padding:15px 30px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="name">AlienX</div>

<div class="stack">

<img src="alienx_portfolio.png">
<img src="alienxgfx.png">
<img src="uialien.png">

</div>

<div class="info">
UI / UX • Roblox / Game Developer<br> 
</div>

</body>
</html>
